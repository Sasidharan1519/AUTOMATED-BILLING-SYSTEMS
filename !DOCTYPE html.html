<!DOCTYPE html>
<html>
<head>
    <title>Automated Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Automated Billing System</h1>

    <div class="customer">
        <h2>Customer Details</h2>

        <label>Customer Name</label>
        <input type="text" placeholder="Enter Name">

        <label>Phone Number</label>
        <input type="text" placeholder="Enter Phone Number">
    </div>

    <div class="product">
        <h2>Product Details</h2>

        <table>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>

            <tr>
                <td>Rice</td>
                <td>2</td>
                <td>₹50</td>
                <td>₹100</td>
            </tr>

            <tr>
                <td>Milk</td>
                <td>1</td>
                <td>₹35</td>
                <td>₹35</td>
            </tr>

            <tr>
                <td>Soap</td>
                <td>3</td>
                <td>₹25</td>
                <td>₹75</td>
            </tr>
        </table>
    </div>

    <div class="bill">
        <h2>Bill Summary</h2>

        <p>Subtotal : ₹210</p>
        <p>GST (5%) : ₹10.50</p>
        <h3>Grand Total : ₹220.50</h3>

        <button>Print Bill</button>
    </div>

</div>

</body>
</html>
